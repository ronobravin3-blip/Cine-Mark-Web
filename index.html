<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMARK Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            /* Change the image name if yours is different */
            background-image:url("images/paul-earle-xJ2tjuUHD9M-unsplash.jpg");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }

        .form-container{
            width:350px;
            padding:40px;
            background:rgba(0,0,0,0.75);
            border-radius:15px;
            text-align:center;
            color:white;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        .form-container h2{
            margin-bottom:25px;
            font-size:40px;
        }

        .form-container input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:5px;
            font-size:16px;
        }

        .form-container button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:5px;
            background:red;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .form-container button:hover{
            background:darkred;
        }

        .form-container p{
            margin-top:20px;
        }

        .form-container a{
            color:#4da6ff;
            text-decoration:none;
        }

        .form-container a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Login</h2>

        <input type="email" id="email" placeholder="Email">

        <input type="password" id="password" placeholder="Password">

        <button id="loginBtn">Login</button>

        <p>
            No account?
            <a href="register.html">Register</a>
        </p>
    </div>

    <script type="module" src="js/auth.js"></script>

</body>
</html>
