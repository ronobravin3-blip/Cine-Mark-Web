<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience - Cinemark Consult Limited</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            color:white;
            min-height:100vh;
            overflow-x:hidden;
            position:relative;

            background:
            radial-gradient(circle at top center,
            rgba(45,95,255,0.6) 0%,
            rgba(10,30,90,0.8) 35%,
            #04112c 100%);
        }

        /* Blue glow */
        body::before{
            content:"";
            position:fixed;
            width:700px;
            height:700px;
            border-radius:50%;
            background:rgba(80,120,255,0.2);
            top:-250px;
            right:-150px;
            z-index:-1;
        }

        /* Dark curve */
        body::after{
            content:"";
            position:fixed;
            width:900px;
            height:400px;
            background:rgba(0,0,0,0.35);
            border-radius:50%;
            bottom:-150px;
            right:-200px;
            transform:rotate(-15deg);
            z-index:-1;
        }

        /* Navbar */
        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 50px;
            background:rgba(0,0,0,0.35);
            backdrop-filter:blur(8px);
        }

        .logo h2{
            color:#7efcff;
            font-size:34px;
        }

        .logo p{
            font-size:12px;
            letter-spacing:3px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-weight:bold;
        }

        nav a.active{
            color:#71ffff;
            border-bottom:3px solid #71ffff;
            padding-bottom:5px;
        }

        /* Main Section */
        .experience-section{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:60px;
            position:relative;
        }

        /* Large background curve */
        .curve{
            position:absolute;
            width:900px;
            height:500px;
            background:rgba(0,0,0,0.25);
            border-radius:50%;
            bottom:-250px;
            right:-150px;
            transform:rotate(-18deg);
            z-index:-1;
        }

        .experience-text{
            width:45%;
        }

        .experience-text h1{
            font-size:90px;
            color:#70ffff;
            margin-bottom:40px;
            line-height:1;
        }

        .experience-text p{
            font-size:22px;
            line-height:1.8;
        }

        .experience-image{
            width:50%;
            overflow:hidden;
            border-top-left-radius:250px;
            border-bottom-left-radius:250px;
        }

        .experience-image img{
            width:100%;
            height:550px;
            object-fit:cover;
        }

        

        /* Mobile */
        @media(max-width:900px){

            header{
                flex-direction:column;
            }

            nav{
                margin-top:20px;
            }

            .experience-section{
                flex-direction:column;
                text-align:center;
            }

            .experience-text,
            .experience-image{
                width:100%;
            }

            .experience-image{
                border-radius:40px;
                margin-top:30px;
            }

            .experience-text h1{
                font-size:55px;
            }

            .experience-text p{
                font-size:18px;
            }
        }

    </style>
</head>

<body>

    <header>

        <div class="logo">
            <h2>CINEMARK</h2>
            <p>CONSULT LIMITED</p>
        </div>

        <nav>
            <a href="who-we-are.html">Who We Are</a>
            <a href="services.html">Our Services</a>
            <a href="partners.html">Our Partners</a>
            <a href="about.html">About Us</a>
            <a href="executives.html">Executives</a>
            <a href="license.html">License</a>
            <a href="experience.html" class="active">Experience</a>
            <a href="value.html">Value</a>
            <a href="contact.html">Contact</a>
        </nav>

    </header>

    <section class="experience-section">

        <div class="curve"></div>

        <div class="experience-text">

            <h1>Our<br>Experience</h1>

            <p>
                Combined, the company's leadership and board has over
                50+ years' experience in the capital markets,
                covering brokerage and fund management.
            </p>

        </div>

        <div class="experience-image">
            <img src="images/viktor-forgacs-3PyBkxgTiL0-unsplash.jpg" alt="Experience">
        </div>

    </section>

    

</body>
</html>
